# SPA de Angular: enruta todo a index.html (fallback), sin cachear el HTML.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
