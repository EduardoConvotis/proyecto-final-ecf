# develop — FRONTEND (feature 002-cicd-pipeline).
# push a develop → CI completo + imagen snapshot x.y.z-snapshot.<sha> + push GHCR
# + dist comprimido como workflow artifact (90 días) + deploy automático SOLO a dev (FR-007/008).
# workflow_dispatch → rollback a dev de un tag existente (FR-014, US5).

name: develop-frontend

on:
  push:
    branches: [develop]
    paths: ['frontend/**', 'contracts/openapi.yaml']
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: "Tag GHCR estable al que revertir (p. ej. 0.1.0-snapshot.abc1234)"
        required: true
        type: string

jobs:
  ci:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run gen:api --workspace frontend
      - run: npm run typecheck --workspace frontend
      - run: npm run lint --workspace frontend
      - run: npm run test --workspace frontend
      - run: npm run build --workspace frontend
      - name: Calcular tag snapshot x.y.z-snapshot.<sha>
        id: tag
        run: |
          ver=$(node -p "require('./frontend/package.json').version")
          echo "tag=${ver}-snapshot.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Comprimir dist
        run: tar -czf frontend-dist-${GITHUB_SHA::7}.tar.gz -C frontend/dist fieldops
      - name: Publicar dist como artifact (90 días)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend-dist-*.tar.gz
          retention-days: 90

  build:
    if: github.event_name == 'push'
    needs: ci
    uses: ./.github/workflows/_build-push.yml
    with:
      component: frontend
      tag: ${{ needs.ci.outputs.tag }}

  deploy-dev:
    if: github.event_name == 'push'
    needs: [ci, build]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy
        with:
          component: frontend
          image: ${{ needs.build.outputs.image }}
          environment: dev
          version: ${{ needs.ci.outputs.tag }}

  rollback-dev:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Resolver imagen a revertir
        id: img
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${repo_lc}/fieldops-frontend:${{ inputs.rollback_tag }}" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/deploy
        with:
          component: frontend
          image: ${{ steps.img.outputs.image }}
          environment: dev
          version: ${{ inputs.rollback_tag }}
